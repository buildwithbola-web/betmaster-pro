<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BetMaster Pro — AI-Powered Sports Betting Analysis</title>
    <meta name="description" content="BetMaster Pro delivers AI-powered sports betting analysis with real-time odds scanning, micro-market insights, and deep match intelligence." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #09090b; /* Zinc 950 */
        color: #e4e4e7; /* Zinc 200 */
      }
      .font-mono {
        font-family: 'JetBrains Mono', monospace;
      }
      /* Custom background texture - Grid Pattern */
      .bg-grid-pattern {
        background-size: 40px 40px;
        background-image: linear-gradient(to right, #27272a 1px, transparent 1px),
                          linear-gradient(to bottom, #27272a 1px, transparent 1px);
        mask-image: radial-gradient(ellipse at center, black 40%, transparent 100%);
        -webkit-mask-image: radial-gradient(ellipse at center, black 40%, transparent 100%);
      }
      .glass-panel {
        background: rgba(24, 24, 27, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      
      @keyframes scan {
        0% { transform: translateY(-10%); opacity: 0; }
        15% { opacity: 0.5; }
        85% { opacity: 0.5; }
        100% { transform: translateY(1100%); opacity: 0; }
      }
      .animate-scan {
        animation: scan 3s linear infinite;
      }

      @keyframes rolling-ball {
        0% { transform: translateX(0) rotate(0deg); }
        50% { transform: translateX(calc(100% - 24px)) rotate(360deg); }
        100% { transform: translateX(0) rotate(720deg); }
      }
      .animate-rolling-ball {
        animation: rolling-ball 4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }

      @keyframes pulse-subtle {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      .animate-pulse-subtle {
        animation: pulse-subtle 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #27272a;
        border-radius: 10px;
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate-fade-in {
        animation: fadeIn 0.4s ease-out forwards;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-fade-in-up {
        animation: fadeInUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }
    </style>

<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
