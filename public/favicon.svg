<svg xmlns="http://www.svg.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="emeraldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="#09090b" stroke="url(#purpleGradient)" stroke-width="3" />
  
  <!-- Outer ring accent -->
  <path d="M 5 50 A 45 45 0 0 1 50 5" stroke="url(#emeraldGradient)" stroke-width="4" fill="none" stroke-linecap="round" />
  
  <!-- Stylized 'B' -->
  <path d="M 35 25 L 35 75" stroke="#ffffff" stroke-width="8" stroke-linecap="round" />
  <path d="M 35 25 L 55 25 C 65 25 70 30 70 40 C 70 47 65 50 55 50 L 35 50" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  <path d="M 35 50 L 58 50 C 68 50 75 55 75 65 C 75 72 68 75 58 75 L 35 75" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  
  <!-- Star accent -->
  <path d="M 75 25 L 80 20 L 85 25 L 80 30 Z" fill="url(#emeraldGradient)" />
</svg>
